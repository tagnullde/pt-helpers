##### PREFIX #####
unbind C-b
set -g prefix C-SPACE
bind C-SPACE send-prefix

##### HISTORY #####
set -g history-limit 50000

##### MOUSE #####
set -g mouse on
unbind -n MouseDown3Pane

##### Create and navigate WINDOWS/Tabs #####
bind Space command-prompt -p "Window name:" "new-window -n '%%'"
bind n command-prompt -I "#W" "rename-window '%%'"
bind -n M-Left  previous-window
bind -n M-Right next-window

##### SPLITS #####
bind h split-window -v      # horizontal (top/bottom)
bind v split-window -h      # vertical (left/right)

##### PANE NAVIGATION (Ctrl + Arrow) #####
bind -n C-Left  select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up    select-pane -U
bind -n C-Down  select-pane -D

##### RESIZE (Ctrl + Shift + Arrow) #####
bind -n C-S-Left  resize-pane -L 5
bind -n C-S-Right resize-pane -R 5
bind -n C-S-Up    resize-pane -U 2
bind -n C-S-Down  resize-pane -D 2

##### AUTO RENAME WINDOWS #####
set -g automatic-rename off

##### STATUS BAR #####
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style bg=#11d116,fg=#000000
set -g window-status-style bg=#11d116,fg=#000000
set -g window-status-current-style bg=colour208,fg=black
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour16,bold] #I:#W "

##### CLIPBOARD (xclip preferred, wl-clipboard fallback) #####
set -g set-clipboard on
set -g mode-keys vi
if-shell "command -v xclip" {
    bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -in -selection clipboard"
    bind -T copy-mode-vi Enter             send -X copy-pipe-and-cancel "xclip -in -selection clipboard"
} {
    bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"
    bind -T copy-mode-vi Enter             send -X copy-pipe-and-cancel "wl-copy"
}

##### TERMINAL #####
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
##### RELOAD CONFIG #####
bind r source-file ~/.pt-tmux.conf \; display-message "tmux.conf reloaded"
